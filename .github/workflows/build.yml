name: Build Anti-Gravity Vibe Coder APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept Android SDK licenses
      run: yes | sdkmanager --licenses || true

    - name: Install Android Build Tools & Platforms
      run: |
        sdkmanager "platforms;android-34" "build-tools;34.0.0"

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'

    - name: Build Debug APK
      run: gradle assembleDebug --stacktrace

    - name: Upload Debug APK artifact (zip)
      uses: actions/upload-artifact@v4
      with:
        name: AntiGravity-VibeCoder-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Copy APK for release
      run: cp app/build/outputs/apk/debug/app-debug.apk anti-gravity-debug.apk

    - name: Delete old 'latest' release if exists
      run: gh release delete latest --yes || true
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Publish direct APK via GitHub Release
      run: |
        gh release create latest anti-gravity-debug.apk \
          --title "Anti-Gravity Vibe Coder - Latest Build" \
          --notes "**Direct APK download — no unzipping needed!**\n\nTap \`anti-gravity-debug.apk\` below to download and install directly on your Android device." \
          --latest
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
