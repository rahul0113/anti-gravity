syntax = "proto3";

package openclaude.v1;

option java_package = "openclaude.v1";
option java_outer_classname = "OpenClaudeProto";

// Main Agent Service
service AgentService {
  // Bidirectional stream: client sends tasks and answers to agent prompts,
  // server streams text tokens, tool states, and requests permissions.
  rpc Chat(stream ClientMessage) returns (stream ServerMessage);
}

// ---------------------------------------------------------
// MESSAGES FROM CLIENT (Input)
// ---------------------------------------------------------
message ClientMessage {
  oneof payload {
    // 1. Initial request (first message in the stream)
    ChatRequest request = 2;

    // 2. User response to an agent prompt (e.g., command confirmation)
    UserInput input = 3;

    // 3. Interrupt signal (if the user clicks "Stop generation")
    CancelSignal cancel = 4;
  }
}

message ChatRequest {
  string message = 1;
  string working_directory = 2;
  optional string model = 4;
  string session_id = 5;
}

message UserInput {
  string reply = 1;
  string prompt_id = 2;
}

message CancelSignal {
  string reason = 1;
}

// ---------------------------------------------------------
// MESSAGES FROM SERVER (Output / Events)
// ---------------------------------------------------------
message ServerMessage {
  oneof event {
    TextChunk text_chunk = 1;
    ToolCallStart tool_start = 2;
    ToolCallResult tool_result = 3;
    ActionRequired action_required = 4;
    FinalResponse done = 5;
    ErrorResponse error = 6;
  }
}

message TextChunk {
  string text = 1;
}

message ToolCallStart {
  string tool_name = 1;
  string arguments_json = 2;
  string tool_use_id = 3;
}

message ToolCallResult {
  string tool_name = 1;
  string output = 2;
  bool is_error = 3;
  string tool_use_id = 4;
}

message ActionRequired {
  string prompt_id = 1;
  string question = 2;
  enum ActionType {
    CONFIRM_COMMAND = 0;
    REQUEST_INFORMATION = 1;
  }
  ActionType type = 3;
}

message FinalResponse {
  string full_text = 1;
  int32 prompt_tokens = 2;
  int32 completion_tokens = 3;
}

message ErrorResponse {
  string message = 1;
  string code = 2;
}
